<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Activity | Life Receipts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500&family=Sacramento&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tourney:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Flavors&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap"
      rel="stylesheet"
    />
    <style>

      .syne {
        font-family: "Syne Mono", serif;
      }
    </style>
  </head>

  <body class="bg-gradient-to-r from-sky-100 to-green-100 syne">
    <div id="navbar"></div>
    <div
      class="bg-white p-9 rounded-2xl shadow-lg w-full max-w-lg my-10 mx-auto"
    >
      <form id="activityForm" class="space-y-6">
        <!-- Activity Name -->
        <div>
          <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">
            Add Daily Activity
          </h1>
        </div>
        <div>
          <label class="block text-gray-700 mb-2">Activity Name</label>
          <input
            type="text"
            id="activity"
            placeholder="e.g., Reading, Gym, Netflix"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-400 focus:outline-none placeholder-gray-400"
          />
        </div>

        <!-- Category / Type with custom option -->
        <div>
          <label class="block text-gray-700 mb-2">Category / Type</label>
          <input
            list="categories"
            id="category"
            placeholder="Select or type your own"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-400 focus:outline-none placeholder-gray-400"
          />
          <datalist id="categories">
            <option value="Work"></option>
            <option value="Study"></option>
            <option value="Leisure"></option>
            <option value="Fitness"></option>
            <option value="Sleep"></option>
            <option value="Personal"></option>
          </datalist>
        </div>

        <!-- Start and End Time -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 mb-2">Start Time</label>
            <input
              type="time"
              id="startTime"
              class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-400 focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-gray-700 mb-2">End Time</label>
            <input
              type="time"
              id="endTime"
              class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-400 focus:outline-none"
            />
          </div>
        </div>

        <!-- Date -->
        <div>
          <label class="block text-gray-700 mb-2">Date</label>
          <input
            type="date"
            id="date"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-400 focus:outline-none"
          />
        </div>

        <!-- Mood -->
        <div>
          <label class="block text-gray-700 mb-2">Mood </label>
          <input
            list="moods"
            id="mood"
            placeholder="Select or type your mood"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-yellow-400 focus:outline-none placeholder-gray-400"
          />
          <datalist id="moods">
            <option value="😊 Happy"></option>
            <option value="😐 Neutral"></option>
            <option value="😴 Tired"></option>
            <option value="😢 Sad"></option>
            <option value="😎 Energetic"></option>
          </datalist>
        </div>

        <!-- Goal Tag -->
        <div>
          <label class="block text-gray-700 mb-2">Goal Tag </label>
          <input
            list="goals"
            id="goal"
            placeholder="Select or type a goal"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-400 focus:outline-none placeholder-gray-400"
          />
          <datalist id="goals">
            <option value="Study Target"></option>
            <option value="Health Goal"></option>
            <option value="Work Project"></option>
            <option value="Sleep Schedule"></option>
          </datalist>
        </div>

        <!-- Notes -->
        <div>
          <label class="block text-gray-700 mb-2">Notes (Optional)</label>
          <textarea
            id="notes"
            placeholder="Add details like ‘Group study’ or ‘Watched with family’"
            class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none placeholder-gray-400"
          ></textarea>
        </div>

        <!-- Submit -->
        <div class="text-center">
          <button
            type="submit"
            class="bg-sky-300 text-gray-800 font-semibold py-2 px-6 rounded-lg hover:bg-green-300 hover:scale-105 transition-transform duration-300"
          >
            Save Activity
          </button>
        </div>
      </form>
    </div>
    <script>
      document
        .getElementById("activityForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const start = document.getElementById("startTime").value;
          const end = document.getElementById("endTime").value;

          const duration =
            (new Date("1970-01-01T" + end) - new Date("1970-01-01T" + start)) /
            (1000 * 60);

          const activityData = {
            activity: document.getElementById("activity").value,
            category: document.getElementById("category").value,
            start_time: start,
            end_time: end,
            duration: duration,
            date: document.getElementById("date").value,
            mood: document.getElementById("mood").value,
            goal: document.getElementById("goal").value,
            notes: document.getElementById("notes").value,
          };

          fetch("http://127.0.0.1:5000/add-activity", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(activityData),
          })
            .then((res) => res.json())
            .then((data) => {
              alert("Activity saved successfully!");
              console.log(data);
            })
            .catch((err) => console.error(err));
        });
    </script>
  </body>
</html>

<!-- “The data entry form captures user activity details and sends them to the backend 
 using a REST API. JavaScript is used to calculate activity duration and transmit structured 
 data to the Flask backend for storage and ML-based analysis.” -->
