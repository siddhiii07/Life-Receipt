<!doctype html>
<html>
  <head>
    <title>My Receipts</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Libertinus+Keyboard&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tourney:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Flavors&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: "Oswald", sans-serif;
      }

      h1 {
        font-family: "Bitcount Grid Double Ink", cursive;
      }

      .syne {
        font-family: "Syne Mono", serif;
      }
    </style>
  </head>

  <body class="bg-gradient-to-br from-indigo-300 to-red-300 min-h-screen syne">
    {% include "navbar.html" %}

    <div class="max-w-3xl mx-auto mt-10 p-6">
      <h1 class="text-3xl font-bold mb-9 text-center syne">My Receipts</h1>

      {% if dates %}
      <div class="grid gap-4">
        {% for d in dates %}
        <a
          href="{{ url_for('receipt', date=d['date']) }}"
          class="bg-yellow-100 p-5 rounded shadow hover:shadow-lg transition hover:scale-[1.02]"
        >
          <div class="flex justify-between items-center">
            <div class="flex flex-col">
              <span class="text-sm text-gray-500">Receipt</span>
              <span class="text-lg font-semibold tracking-wide">
                {{ d["date"] }}
              </span>
            </div>
            <span class="text-gray-400 text-sm">→</span>
          </div>
        </a>
        {% endfor %}
      </div>
      {% else %}
      <p class="text-center text-gray-500">No receipts yet.</p>
      {% endif %}
    </div>
  </body>
</html>
