<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Keyboard&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <title>Life Receipt</title>
    <style>
        body {
            font-family: "serif", "oswald", 'Bitcount Grid Double Ink', sans-serif;
        }
    </style>
</head>

<body>
    <div class="flex p-2 justify-between items-center bg-black font-sans text-white relative z-50">
        <div class="flex items-center">
            <a href="index.html">
                <img class="size-10 ml-10 shadow-xl" src={{ url_for('static', filename='assets/work-life.png' ) }}
                    alt="clock"> </a>
            <a href="index.html">
                <p class="p-3 m-0">Life Receipt</p>
            </a>

        </div>

        <div class="flex items-center space-x-4 mr-10">

            <!-- <div class="flex items-center space-x-2">
                <input
                    class=" text-black border-1 p-4 rounded-sm w-60 h-10 bg-green-300 shadow-xl shadow-green-700/50 hover:scale-105 transform transition-transform duration-300 placeholder-black"
                    type="text" id="serachInput" placeholder="Search">
                <button
                    class="text-black w-10 py-3 rounded bg-yellow-100 shadow-xl shadow-yellow-700/50 hover:scale-105 transform transition-transform duration-300 fas fa-search"></button>
            </div> -->


            <ul class="flex space-x-4 items-center">
                <li class="relative group">
                    <a href="{{ url_for('home') }}" class="py-4 px-3 hover:text-green-400">Home</a>
                    <!-- <ul class="absolute left-0 mt-1 hidden group-hover:block bg-white text-black rounded shadow-lg">
                        <li class="px-4 py-2 hover:bg-green-200"><a href="/dashboard">Dashboard</a></li>
                        <li class="px-4 py-2 hover:bg-green-200">Overview</li>
                    </ul> -->
                </li>
                <li class="relative">
                    <button id="projectsBtn" class="py-4 px-3 hover:text-green-400 focus:outline-none"> Projects
                    </button>

                    <ul id="projectsDropdown"
                        class="absolute left-0 mt-1 hidden bg-white text-black rounded shadow-lg z-50">
                        <li class="px-4 py-2 hover:bg-green-200 cursor-pointer">
                            <a href="{{ url_for('my_receipts') }}">My Receipts</a>
                        </li>

                        <li class="px-4 py-2 hover:bg-green-200 cursor-pointer"><a href="/analytics">Analytics</a></li>
                        <li class="px-4 py-2 hover:bg-green-200 cursor-pointer"><a href="/game-dashboard">View My Stats</a></li>
                    </ul>
                </li>
                <li class="py-4 px-3 hover:text-green-400"> <a href="{{ url_for('contact') }}">Contact Us</a></li>
                <!-- <li class="py-4 px-3 hover:text-green-400"> <a href="about.html">About</a></li> -->

                {% if session.get("user_id") %}
                <li class="relative">
                    <button id="profileBtn"
                        class="w-10 h-10 bg-indigo-500 text-white flex items-center justify-center rounded-full font-bold focus:outline-none">
                        {{ session.get("email", "")[:1]|upper }}
                    </button>

                    <div id="profileDropdown"
                        class="absolute right-0 mt-2 w-40 bg-white text-black shadow-lg rounded-lg hidden z-50">
                        <a href="/dashboard" class="block px-4 py-2 hover:bg-green-200 cursor-pointer">Dashboard</a>
                        <a href="/logout" class="block px-4 py-2 hover:bg-green-200 cursor-pointer">Logout</a>
                    </div>
                </li>
                {% else %}

                <li>
                    <a href="/login">
                        <button
                            class="w-50 px-5 py-2 rounded bg-indigo-500 text-white shadow-xl shadow-blue-500/40 hover:bg-indigo-600 hover:scale-105 transform transition-transform duration-300">
                            Log In
                        </button>
                    </a>
                </li>
                <li>
                    <a href="/signup">
                        <button
                            class="w-50 px-5 py-2 rounded bg-indigo-500 text-white shadow-xl shadow-blue-500/40 hover:bg-indigo-600 hover:scale-105 transform transition-transform duration-300">
                            Sign Up
                        </button>
                    </a>
                </li>
                {% endif %}

            </ul>
        </div>
    </div>
</body>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        // PROFILE DROPDOWN
        const profileBtn = document.getElementById("profileBtn");
        const profileDropdown = document.getElementById("profileDropdown");

        if (profileBtn) {
            profileBtn.addEventListener("click", function (e) {
                e.stopPropagation();
                profileDropdown.classList.toggle("hidden");
            });
        }

        // PROJECTS DROPDOWN
        const projectsBtn = document.getElementById("projectsBtn");
        const projectsDropdown = document.getElementById("projectsDropdown");

        if (projectsBtn) {
            projectsBtn.addEventListener("click", function (e) {
                e.stopPropagation();
                projectsDropdown.classList.toggle("hidden");
            });
        }

        // CLOSE DROPDOWNS WHEN CLICKING OUTSIDE
        document.addEventListener("click", function (e) {
            if (profileDropdown && !profileDropdown.contains(e.target)) {
                profileDropdown.classList.add("hidden");
            }

            if (projectsDropdown && !projectsDropdown.contains(e.target)) {
                projectsDropdown.classList.add("hidden");
            }
        });
    });
</script>

</html>
